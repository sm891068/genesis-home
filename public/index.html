<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑道建築 Underworld Architect</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --gold: #d4af37;
            --gold-light: #f4d03f;
            --gold-dark: #b8941f;
            --gold-glow: rgba(212, 175, 55, 0.3);
            --red: #ff2e63;
            --blue: #3498db;
            --bg: #0a0e27;
            --bg-light: #151a35;
            --panel: rgba(10, 14, 39, 0.98);
            --text: #e8e8e8;
            --gray: #888;
            --border: rgba(212, 175, 55, 0.2);
        }
        
        body {
            font-family: 'Noto Serif TC', serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        /* ========== 下雨動畫 ========== */
        .rain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        
        .raindrop {
            position: absolute;
            width: 2px;
            height: 20px;
            background: linear-gradient(transparent, rgba(212, 175, 55, 0.3));
            animation: fall linear infinite;
        }
        
        @keyframes fall {
            to { transform: translateY(100vh); }
        }
        
        /* ========== 主選單容器 ========== */
        #main-menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            position: relative;
            z-index: 10;
            background: radial-gradient(ellipse at center, rgba(212,175,55,0.05) 0%, transparent 70%);
        }
        
        .logo {
            font-size: 48px;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 30px var(--gold-glow), 0 0 60px var(--gold-glow);
            margin-bottom: 20px;
            animation: glow 3s ease-in-out infinite;
            font-family: 'Noto Serif TC', serif;
            letter-spacing: 4px;
        }
        
        @keyframes glow {
            0%, 100% { text-shadow: 0 0 30px var(--gold-glow), 0 0 60px var(--gold-glow); }
            50% { text-shadow: 0 0 40px var(--gold-glow), 0 0 80px var(--gold-glow), 0 0 100px rgba(212,175,55,0.1); }
        }
        
        .subtitle {
            font-size: 18px;
            color: var(--gray);
            margin-bottom: 60px;
            letter-spacing: 2px;
        }
        
        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-width: 320px;
        }
        
        .menu-btn {
            padding: 18px 40px;
            background: linear-gradient(135deg, rgba(212,175,55,0.15), rgba(212,175,55,0.05));
            border: 2px solid var(--gold-dark);
            color: var(--text);
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s;
            font-family: 'Noto Serif TC', serif;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .menu-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(212,175,55,0.2), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s;
        }
        
        .menu-btn:hover::before {
            transform: translateX(100%);
        }
        
        .menu-btn:hover {
            background: linear-gradient(135deg, rgba(212,175,55,0.3), rgba(212,175,55,0.1));
            border-color: var(--gold);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(212,175,55,0.3);
        }
        
        .menu-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            background: rgba(255,255,255,0.05);
            border-color: var(--gray);
        }
        
        .menu-btn:disabled:hover {
            transform: none;
            box-shadow: none;
        }

        .menu-label {
            display: block;
            font-size: 18px;
            line-height: 1.2;
        }

        .menu-desc {
            display: block;
            margin-top: 6px;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 500;
            line-height: 1.35;
        }
        
        .footer-info {
            position: fixed;
            bottom: 20px;
            text-align: center;
            width: 100%;
            font-size: 12px;
            color: var(--gray);
            z-index: 10;
        }
        
        /* ========== Toast 樣式 ========== */
        .toast {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.95);
            border: 1.5px solid var(--gold);
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            box-shadow: 0 0 30px var(--gold-glow);
        }
        
        .toast.show { opacity: 1; }
        
        .toast.success { border-color: #27ae60; }
        .toast.error { border-color: #e74c3c; }
        .toast.warning { border-color: #f39c12; }
        
        /* ========== 響應式設計 ========== */
        @media (max-width: 768px) {
            .logo { font-size: 36px; }
            .subtitle { font-size: 14px; margin-bottom: 40px; }
            .menu-buttons { min-width: 280px; gap: 12px; }
            .menu-btn { padding: 16px 32px; font-size: 16px; }
        }
        
        @media (max-width: 480px) {
            .logo { font-size: 28px; }
            .subtitle { font-size: 12px; margin-bottom: 30px; }
            .menu-buttons { min-width: 240px; gap: 10px; }
            .menu-btn { padding: 14px 28px; font-size: 14px; }
        }

        /* ========== v0.1 rebuild main menu cover layout ========== */
        :root {
            --text-muted: #a8a096;
        }

        #main-menu {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(360px, 520px);
            grid-auto-rows: auto;
            align-items: center;
            align-content: center;
            justify-content: end;
            gap: 10px;
            min-height: 680px;
            padding: clamp(24px, 4vw, 56px);
            background: #06070b;
            overflow: hidden;
        }

        #main-menu::before,
        #main-menu::after {
            content: '';
            position: absolute;
            inset-block: 0;
            z-index: 0;
            pointer-events: none;
            background-size: cover;
            background-repeat: no-repeat;
        }

        #main-menu::before {
            left: 0;
            width: 50%;
            background-image:
                linear-gradient(90deg, rgba(0,0,0,0.06), rgba(0,0,0,0.16) 62%, rgba(0,0,0,0.86)),
                url('/static/images/main-menu-left-cover.png');
            background-position: center;
        }

        #main-menu::after {
            right: 0;
            width: 50%;
            background-image:
                linear-gradient(90deg, rgba(0,0,0,0.88), rgba(0,0,0,0.18) 28%, rgba(0,0,0,0.34)),
                url('/static/images/main-menu-right-cover.png');
            background-position: center right;
        }

        #main-menu > .logo,
        #main-menu > .subtitle,
        #main-menu > .menu-buttons,
        #main-menu > .footer-info {
            grid-column: 2;
            position: relative;
            z-index: 3;
            width: min(390px, 100%);
            justify-self: end;
            margin-right: clamp(26px, 3.6vw, 58px);
        }

        .logo {
            align-self: end;
            margin-bottom: 6px;
            text-align: center;
            font-size: 36px;
            letter-spacing: 0;
        }

        .subtitle {
            margin-bottom: 18px;
            color: var(--text-muted);
            text-align: center;
        }

        .menu-buttons {
            min-width: 0;
            gap: 11px;
            padding: 22px;
            background:
                linear-gradient(180deg, rgba(8, 9, 12, 0.82), rgba(8, 9, 12, 0.62)),
                radial-gradient(circle at top, rgba(212,175,55,0.18), transparent 55%);
            border: 1px solid rgba(212, 175, 55, 0.54);
            box-shadow:
                0 18px 60px rgba(0,0,0,0.48),
                inset 0 0 0 1px rgba(255,255,255,0.04);
            backdrop-filter: blur(2px);
        }

        .menu-btn {
            min-height: 58px;
            padding: 11px 16px;
            background: linear-gradient(135deg, rgba(20,19,17,0.86), rgba(212,175,55,0.07));
            border: 1px solid rgba(212, 175, 55, 0.48);
            border-radius: 4px;
            text-align: left;
        }

        .menu-label {
            font-size: 16px;
        }

        .menu-desc {
            margin-top: 4px;
        }

        .footer-info {
            position: relative;
            right: auto;
            bottom: auto;
            margin-top: 8px;
            text-align: center;
        }

        @media (max-width: 768px) {
            #main-menu {
                grid-template-columns: 1fr;
                justify-content: center;
                min-height: 100vh;
                padding: 28px 18px 54px;
            }

            #main-menu::before {
                width: 100%;
                opacity: 0.44;
            }

            #main-menu::after {
                width: 100%;
                opacity: 0.78;
                background-position: center;
            }

            #main-menu > .logo,
            #main-menu > .subtitle,
            #main-menu > .menu-buttons,
            #main-menu > .footer-info {
                grid-column: 1;
                width: min(430px, 100%);
                justify-self: center;
                margin-right: 0;
            }

            .logo { font-size: 34px; }
            .subtitle { margin-bottom: 14px; }
            .menu-buttons { gap: 9px; padding: 18px; }
            .menu-btn { min-height: 54px; padding: 10px 14px; }
            .footer-info {
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            .menu-buttons { gap: 8px; padding: 14px; }
            .menu-label { font-size: 15px; }
            .menu-desc { font-size: 11px; }
        }
    </style>
</head>
<body>
    <!-- 下雨動畫容器 -->
    <div class="rain" id="rain"></div>

    <!-- Toast 提示 -->
    <div id="toast" class="toast"></div>

    <!-- 主選單 -->
    <div id="main-menu">
        <div class="logo">黑道建築</div>
        <div class="subtitle">UNDERWORLD ARCHITECT</div>
        
        <div class="menu-buttons">
            <button class="menu-btn" onclick="menuController.newGame()">
                🆕 新的傳承
            </button>
            <button class="menu-btn" id="continue-btn" onclick="menuController.continueGame()" disabled>
                ▶️ 繼續遊戲
            </button>
            <button class="menu-btn" onclick="menuController.showGloryHall()">
                👑 榮耀殿堂
            </button>
            <button class="menu-btn" onclick="menuController.showAchievements()">
                🏆 成就殿堂
            </button>
            <button class="menu-btn" onclick="menuController.showPartnerGallery()">
                📖 夥伴圖鑑
            </button>
            <button class="menu-btn" onclick="menuController.showDiary()">
                📔 黑道日誌
            </button>
            <button class="menu-btn" onclick="menuController.showOfficeSettings()">
                🏢 辦公室設定
            </button>
        </div>
        
        <div class="footer-info">
            Version 1.0.0 | Made with ❤️ by Your Studio
        </div>
    </div>

    <!-- 父親對話畫面 -->
    <div id="father-dialogue" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; padding: 40px;">
        <div style="display: flex; align-items: center; justify-content: center; flex-direction: column; height: 100%;">
        <div style="max-width: 800px; text-align: center;">
            <div style="font-size: 60px; margin-bottom: 20px;">👔</div>
            <h2 style="color: var(--gold); font-size: 32px; margin-bottom: 30px;">龍爺的遺言</h2>
            <div id="dialogue-text" style="font-size: 20px; line-height: 2; color: var(--text); min-height: 200px; padding: 30px; background: rgba(212,175,55,0.1); border: 2px solid var(--border); border-radius: 10px;">
            </div>
            <div id="dialogue-timer" style="margin-top: 20px; color: var(--gray); font-size: 16px;"></div>
        </div>
        </div>
    </div>

    <!-- 整合畫面：路線選擇 + 命名 -->
    <div id="route-selection" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; overflow-y: auto; padding: 20px;">
        <div style="max-width: 1400px; margin: 0 auto;">
            <h2 style="color: var(--gold); font-size: clamp(24px, 5vw, 36px); text-align: center; margin-bottom: 10px;">選擇你的道路</h2>
            <p style="text-align: center; color: var(--gray); margin-bottom: 30px; font-size: clamp(14px, 3vw, 16px);">5條路線，不同的傳奇</p>
            
            <!-- 路線網格：響應式 2x3 佈局（縮小10%）-->
            <div id="routes-container" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(min(252px, 100%), 1fr)); gap: 13px; margin-bottom: 27px; max-width: 1080px; margin-left: auto; margin-right: auto;">
                <!-- 路線卡片將由 JavaScript 生成 -->
            </div>
            
            <!-- 命名表單區 -->
            <div style="background: var(--panel); border: 2px solid var(--gold); border-radius: 12px; padding: clamp(20px, 4vw, 40px); max-width: 600px; margin: 0 auto 20px;">
                <h3 style="color: var(--gold); font-size: clamp(20px, 4vw, 28px); text-align: center; margin-bottom: 20px;">建立你的帝國</h3>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                    <div>
                        <label style="display: block; color: var(--text); margin-bottom: 8px; font-size: clamp(14px, 2.5vw, 16px);">幫派名稱</label>
                        <input id="gang-name-input" type="text" placeholder="龍門幫" maxlength="8" style="width: 100%; padding: 12px; font-size: clamp(16px, 3vw, 18px); text-align: center; background: rgba(255,255,255,0.1); border: 2px solid var(--border); color: var(--text); border-radius: 8px;" />
                    </div>
                    <div>
                        <label style="display: block; color: var(--text); margin-bottom: 8px; font-size: clamp(14px, 2.5vw, 16px);">你的稱號</label>
                        <input id="player-name-input" type="text" placeholder="老大" maxlength="6" style="width: 100%; padding: 12px; font-size: clamp(16px, 3vw, 18px); text-align: center; background: rgba(255,255,255,0.1); border: 2px solid var(--border); color: var(--text); border-radius: 8px;" />
                    </div>
                </div>
                
                <div id="selected-route-display" style="text-align: center; color: var(--gray); font-size: clamp(13px, 2.5vw, 15px); margin-bottom: 15px; min-height: 24px;">
                    請先選擇路線
                </div>
                
                <button id="confirm-start-btn" onclick="menuController.confirmStart()" disabled style="width: 100%; padding: clamp(14px, 3vw, 18px); background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border: none; color: #000; font-size: clamp(18px, 3.5vw, 22px); font-weight: bold; cursor: not-allowed; border-radius: 8px; transition: all 0.3s; box-shadow: 0 4px 15px var(--gold-glow); opacity: 0.5;">
                    開始傳承 🎯
                </button>
            </div>
            
            <div style="text-align: center;">
                <button onclick="menuController.cancelRouteSelection()" style="padding: clamp(10px, 2vw, 15px) clamp(30px, 5vw, 40px); background: rgba(255,255,255,0.1); border: 2px solid var(--border); color: var(--text); font-size: clamp(14px, 2.5vw, 16px); cursor: pointer; border-radius: 8px; transition: all 0.3s;">
                    ← 返回主選單
                </button>
            </div>
        </div>
    </div>

    <!-- 載入核心腳本 -->
    <script src="/static/core/game-state.js"></script>
    <script src="/static/ui/shared-ui.js"></script>
    <script src="/static/routes-data.js"></script>
    <script src="/static/partner-data.js"></script>
    <script src="/static/data/ai-personality.js"></script>
    <script src="/static/data/ai-character-logic.js"></script>

    <script>
    // ========== 主選單控制器 ==========
    const menuController = {
        selectedRoute: null,

        renderRedevelopmentMenu() {
            const menu = document.querySelector('.menu-buttons');
            if (!menu) return;

            const items = [
                {
                    id: 'new-game-btn',
                    label: '新的傳承',
                    desc: '從父親遺言開始新遊戲',
                    action: 'menuController.newGame()'
                },
                {
                    id: 'continue-btn',
                    label: '繼續遊戲',
                    desc: '讀取最近的幫派存檔',
                    action: 'menuController.continueGame()',
                    disabled: true
                },
                {
                    label: '設定',
                    desc: '音效、畫面、存檔與帳號資料',
                    action: 'menuController.showOfficeSettings()'
                },
                {
                    label: '版本資訊',
                    desc: '查看 v0.1 重建範圍與開發方向',
                    action: 'menuController.showVersionInfo()'
                }
            ];

            menu.innerHTML = items.map((item) => `
                <button class="menu-btn" ${item.id ? `id="${item.id}"` : ''} onclick="${item.action}" ${item.disabled ? 'disabled' : ''}>
                    <span class="menu-label">${item.label}</span>
                    <span class="menu-desc">${item.desc}</span>
                </button>
            `).join('');

            const footer = document.querySelector('.footer-info');
            if (footer) {
                footer.textContent = 'v0.1 Rebuild Foundation | Underworld Architect';
            }
        },
        
        init() {
            console.log('[MainMenu] 初始化主選單');
            this.renderRedevelopmentMenu();
            
            // 檢查是否有存檔
            this.updateContinueButton();
            this.normalizeContinueButton();
            
            // 初始化下雨動畫
            this.initRain();
        },

        // 更新繼續按鈕狀態
        updateContinueButton() {
            const btn = document.getElementById('continue-btn');
            const latestSave = GameState.getLatestSave();
            
            if (latestSave) {
                btn.disabled = false;
                btn.textContent = `▶️ 繼續遊戲 (Day ${latestSave.day})`;
            } else {
                btn.disabled = true;
                btn.textContent = '▶️ 繼續遊戲';
            }
        },

        // 新遊戲 - 啟動父親對話
        normalizeContinueButton() {
            const btn = document.getElementById('continue-btn');
            const latestSave = GameState.getLatestSave();

            if (latestSave) {
                btn.disabled = false;
                btn.innerHTML = `
                    <span class="menu-label">繼續遊戲 (Day ${latestSave.day})</span>
                    <span class="menu-desc">讀取最近的幫派存檔</span>
                `;
            } else {
                btn.disabled = true;
                btn.innerHTML = `
                    <span class="menu-label">繼續遊戲</span>
                    <span class="menu-desc">目前沒有可讀取的存檔</span>
                `;
            }
        },

        newGame() {
            this.showFatherDialogue();
        },

        // 顯示父親對話（14秒）
        showFatherDialogue() {
            const dialogue = document.getElementById('father-dialogue');
            const dialogueText = document.getElementById('dialogue-text');
            const timer = document.getElementById('dialogue-timer');
            const mainMenu = document.getElementById('main-menu');
            
            // 隱藏主選單
            mainMenu.style.display = 'none';
            dialogue.style.display = 'block';
            
            // 父親的遺言（擴充劇情版）
            const messages = [
                '孩子，如果你看到這段影片，代表我已經不在了...',
                '這個城市很殘酷，我在這條路上走了三十年，見證了無數的生死。',
                '記住，做人要有底線。別碰毒品，那是底線。',
                '錢很重要，但不是一切。錢能解決的，都不是問題。',
                '真正的老大，靠的是尊重而非恐懼。這城市，尊重比恐懼更重要。',
                '我知道你喜歡漂亮姑娘，有美人，記得帶回家給你媽看看。',
                '江湖上，拳頭是硬道理，但腦子更重要。懂得用腦才能活得長久。',
                '我留給你的，不只是這個幫派，還有我的信念和三十年的人脈。',
                '我為你準備了一個可靠的引導者，他會在你最需要的時候出現。',
                '無論你選擇哪條路，都要記住，家人永遠是最重要的。',
                '現在，選擇你自己的道路吧...走出屬於你的傳奇。',
                '記住，爸爸永遠以你為榮。願你平安，願你強大。'
            ];
            
            let currentIndex = 0;
            let timeLeft = 14;
            
            // 更新對話內容
            const updateDialogue = () => {
                if (currentIndex < messages.length) {
                    dialogueText.textContent = messages[currentIndex];
                    currentIndex++;
                }
            };
            
            // 初始顯示
            updateDialogue();
            
            // 每1.15秒換一句（12句 × 1.15秒 ≈ 14秒）
            const dialogueInterval = setInterval(updateDialogue, 1150);
            
            // 倒計時
            const countdownInterval = setInterval(() => {
                timeLeft--;
                timer.textContent = `${timeLeft} 秒後進入路線選擇...`;
                
                if (timeLeft <= 0) {
                    clearInterval(dialogueInterval);
                    clearInterval(countdownInterval);
                    
                    // 進入路線選擇
                    dialogue.style.display = 'none';
                    this.showRouteSelection();
                }
            }, 1000);
        },

        // 顯示路線選擇（整合版）
        showRouteSelection() {
            const routeSelection = document.getElementById('route-selection');
            const container = document.getElementById('routes-container');
            
            routeSelection.style.display = 'block';
            
            // 生成路線卡片
            container.innerHTML = '';
            Object.values(ROUTES_DATA).forEach(route => {
                const card = this.createRouteCard(route);
                container.appendChild(card);
            });
            
            // 重置選擇狀態
            this.selectedRoute = null;
            this.updateStartButton();
        },

        // 創建路線卡片（緊湊版）
        createRouteCard(route) {
            const card = document.createElement('div');
            card.className = 'route-card';
            card.dataset.routeId = route.id;
            card.style.cssText = `
                background: linear-gradient(135deg, ${route.color}20, ${route.color}05);
                border: 3px solid ${route.color};
                border-radius: 10px;
                padding: clamp(13px, 2.7vw, 18px);
                cursor: pointer;
                transition: all 0.3s;
                position: relative;
                overflow: hidden;
                min-height: 180px;
            `;
            
            card.innerHTML = `
                <div style="font-size: clamp(29px, 7.2vw, 36px); text-align: center; margin-bottom: 9px;">${route.icon}</div>
                <h3 style="color: ${route.color}; font-size: clamp(16px, 3.6vw, 20px); text-align: center; margin-bottom: 7px; font-weight: bold;">${route.name}</h3>
                <p style="color: var(--gray); text-align: center; font-style: italic; margin-bottom: 11px; font-size: clamp(11px, 2.25vw, 13px); line-height: 1.4;">${route.subtitle}</p>
                
                <div style="background: rgba(0,0,0,0.3); padding: clamp(7px, 1.8vw, 11px); border-radius: 5px; margin-bottom: 9px;">
                    <div style="color: var(--text); font-size: clamp(10px, 1.8vw, 12px); line-height: 1.5; text-align: center;">
                        💰 ${(route.bonuses.money / 1000).toFixed(0)}K | 
                        🎖️ ${route.bonuses.reputation} | 
                        👥 ${route.bonuses.crew}
                    </div>
                </div>
                
                <div class="route-selected-mark" style="display: none; position: absolute; top: 9px; right: 9px; background: ${route.color}; color: #fff; padding: 4px 9px; border-radius: 18px; font-size: 11px; font-weight: bold;">
                    ✓ 已選
                </div>
            `;
            
            // 懸停效果
            card.addEventListener('mouseenter', () => {
                if (!card.classList.contains('selected')) {
                    card.style.transform = 'translateY(-5px)';
                    card.style.boxShadow = `0 10px 30px ${route.color}60`;
                }
            });
            
            card.addEventListener('mouseleave', () => {
                if (!card.classList.contains('selected')) {
                    card.style.transform = 'translateY(0)';
                    card.style.boxShadow = 'none';
                }
            });
            
            // 點擊選擇路線
            card.addEventListener('click', () => {
                this.selectRoute(route.id, card);
            });
            
            return card;
        },

        // 選擇路線（整合版）
        selectRoute(routeId, cardElement) {
            this.selectedRoute = routeId;
            const route = ROUTES_DATA[routeId];
            
            // 移除所有卡片的選中狀態
            document.querySelectorAll('.route-card').forEach(c => {
                c.classList.remove('selected');
                c.style.borderWidth = '3px';
                c.style.transform = 'translateY(0)';
                c.querySelector('.route-selected-mark').style.display = 'none';
            });
            
            // 標記當前選中的卡片
            cardElement.classList.add('selected');
            cardElement.style.borderWidth = '5px';
            cardElement.style.boxShadow = `0 0 30px ${route.color}80`;
            cardElement.querySelector('.route-selected-mark').style.display = 'block';
            
            // 更新選中顯示
            document.getElementById('selected-route-display').innerHTML = `
                已選擇：<span style="color: ${route.color}; font-weight: bold;">${route.icon} ${route.name}</span>
            `;
            
            // 啟用開始按鈕
            this.updateStartButton();
        },
        
        // 更新開始按鈕狀態
        updateStartButton() {
            const btn = document.getElementById('confirm-start-btn');
            if (this.selectedRoute) {
                btn.disabled = false;
                btn.style.cursor = 'pointer';
                btn.style.opacity = '1';
            } else {
                btn.disabled = true;
                btn.style.cursor = 'not-allowed';
                btn.style.opacity = '0.5';
            }
        },
        
        // 確認開始遊戲（整合版）
        confirmStart() {
            if (!this.selectedRoute) {
                Toast.error('請先選擇一條路線');
                return;
            }
            
            const gangName = document.getElementById('gang-name-input').value.trim();
            const playerName = document.getElementById('player-name-input').value.trim();
            
            if (!gangName || gangName.length < 2) {
                Toast.error('請輸入幫派名稱（至少2個字）');
                document.getElementById('gang-name-input').focus();
                return;
            }
            
            if (!playerName || playerName.length < 2) {
                Toast.error('請輸入你的稱號（至少2個字）');
                document.getElementById('player-name-input').focus();
                return;
            }
            
            // 顯示載入畫面
            LoadingScreen.show('創建你的帝國...');
            
            setTimeout(() => {
                const success = GameState.newGame(this.selectedRoute, gangName, playerName);
                
                if (success) {
                    LoadingScreen.hide();
                    Toast.success(`歡迎，${playerName}！${gangName}正式成立！`);
                    
                    // 跳轉到遊戲畫面
                    setTimeout(() => {
                        window.location.href = '/game-main.html';
                    }, 1500);
                } else {
                    LoadingScreen.hide();
                    Toast.error('遊戲初始化失敗');
                }
            }, 2000);
        },

        // 確認命名並開始遊戲
        // 取消路線選擇
        cancelRouteSelection() {
            document.getElementById('route-selection').style.display = 'none';
            document.getElementById('main-menu').style.display = 'flex';
        },

        // 繼續遊戲
        continueGame() {
            const latestSave = GameState.getLatestSave();
            
            if (!latestSave) {
                Toast.error('找不到存檔');
                return;
            }

            LoadingScreen.show('載入存檔中...');
            
            setTimeout(() => {
                const success = GameState.load(latestSave.id);
                
                if (success) {
                    LoadingScreen.hide();
                    Toast.success('存檔載入成功！');
                    
                    // 跳轉到遊戲畫面
                    setTimeout(() => {
                        window.location.href = '/game-main.html';
                    }, 800);
                } else {
                    LoadingScreen.hide();
                    Toast.error('存檔載入失敗');
                }
            }, 1500);
        },

        // 顯示夥伴圖鑑
        showPartnerGallery() {
            Toast.show('夥伴圖鑑功能開發中...', 2000);
            // TODO: 顯示夥伴圖鑑畫面
        },

        // 顯示榮耀殿堂
        showGloryHall() {
            Toast.show('榮耀殿堂功能開發中...', 2000);
            // TODO: 顯示榮耀殿堂畫面
        },

        // 顯示成就殿堂
        showAchievements() {
            Toast.show('成就殿堂功能開發中...', 2000);
            // TODO: 顯示成就殿堂畫面
        },

        // 顯示黑道日誌
        showDiary() {
            Toast.show('黑道日誌功能開發中...', 2000);
            // TODO: 顯示黑道日誌畫面
        },

        // 顯示辦公室設定
        showOfficeSettings() {
            Toast.show('辦公室設定功能開發中...', 2000);
            // TODO: 顯示辦公室設定畫面
        },

        // 初始化下雨動畫
        showFatherMainline() {
            Toast.show('父親主線：雨夜遺言與舊帳本章節規劃中...', 2400);
        },

        showBaseManagement() {
            Toast.show('幫派基地將整合建設、資源與據點管理。', 2400);
        },

        showOnlineBattle() {
            Toast.show('聯機戰鬥規劃中：PVP、攻擊玩家幫派與戰報系統。', 2600);
        },

        showVersionInfo() {
            Toast.show('v0.1：主選單、存檔讀取、遊戲內建築、區域與角色系統全面重建中。', 3000);
        },

        initRain() {
            const rainContainer = document.getElementById('rain');
            const dropCount = 100; // 雨滴數量

            for (let i = 0; i < dropCount; i++) {
                const drop = document.createElement('div');
                drop.className = 'raindrop';
                
                // 隨機位置
                drop.style.left = Math.random() * 100 + '%';
                
                // 隨機延遲
                drop.style.animationDelay = Math.random() * 2 + 's';
                
                // 隨機持續時間
                drop.style.animationDuration = (Math.random() * 1 + 1) + 's';
                
                // 隨機透明度
                drop.style.opacity = Math.random() * 0.5 + 0.3;
                
                rainContainer.appendChild(drop);
            }
        }
    };

    // 頁面載入完成後初始化
    document.addEventListener('DOMContentLoaded', () => {
        menuController.init();
    });
    </script>
</body>
</html>
